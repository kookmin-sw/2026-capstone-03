spring.datasource.url=jdbc:mysql://localhost:3306/stamp_tour?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

server.port=5000

# JWT 암호화 키
jwt.secret=영어와_숫자로_아무거나_24자이상
jwt.expiration_time=86400000

# 카카오 로그인 api
kakao.client.id=API_KEY_입력

# 네이버 로그인 api
naver.client.id=API_KEY_입력
naver.client.secret=API_SECRET_입력

# 구글 로그인 api
google.client.id=API_KEY_입력
google.client.secret=API_SECRET_입력